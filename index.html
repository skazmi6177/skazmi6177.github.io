<!DOCTYPE html>
<html>
<head>
    <title>Learn About Cat Facts</title>
</head>
<body>
    <h1>Learn About Cat Facts</h1>

    <button onclick="loadData()">Click Me For Cat Facts</button>

    <img src="funfacts.jpg" alt="Cat Picture" id="catPicture" width="250">

    <table>
        <thead>
            <tr>
                <th>factId</th>
                <th>fact</th>
            </tr>
        </thead>
        <tbody id="factsOutput">
        </tbody>
    </table>

    <script>
        async function loadData() {
            const url = "https://brianobruno.github.io/cats.json";

            const response = await fetch(url);
            const data = await response.json();

            data.facts.sort(function(a, b) {
                return a.factId - b.factId;
            });
            
            const tableBody = document.getElementById("factsOutput");
            tableBody.innerHTML = ""; 
            
            data.facts.forEach(function(item) {
                const row = document.createElement("tr");

                const idCell = document.createElement("td");
                idCell.textContent = item.factId;  

                const factCell = document.createElement("td");
                factCell.textContent = item.text;  

                row.appendChild(idCell);
                row.appendChild(factCell);

                tableBody.appendChild(row);
            });

            document.getElementById("catPicture").src = data.catPhoto;
        }
    </script>
</body>
</html>
